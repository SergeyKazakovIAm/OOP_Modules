<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Заявки | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link active" th:href="@{/tickets}">Заявки</a>
            <a class="nav-link" th:href="@{/tickets/new}">Создать заявку</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link" th:href="@{/contacts}">Контакты</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Список заявок</h1>
            <p class="text-muted mb-0">Все обращения пользователей Help Desk</p>
        </div>
        <a th:href="@{/tickets/new}" class="btn btn-primary">Создать заявку</a>
    </div>

    <div class="table-responsive shadow-sm">
        <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-primary">
            <tr>
                <th>ID</th>
                <th>Пользователь</th>
                <th>Тема</th>
                <th>Статус</th>
                <th>Дата создания</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ticket : ${tickets}">
                <td th:text="${ticket.id}">1</td>
                <td th:text="${ticket.customerName}">Анна</td>
                <td th:text="${ticket.title}">Не работает принтер</td>
                <td>
                    <span class="badge bg-secondary" th:text="${ticket.status}">NEW</span>
                </td>
                <td th:text="${ticket.createdAt}">2026-05-28T10:30</td>
            </tr>
            <tr th:if="${#lists.isEmpty(tickets)}">
                <td colspan="5" class="text-center text-muted py-4">
                    Пока нет ни одной заявки
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
