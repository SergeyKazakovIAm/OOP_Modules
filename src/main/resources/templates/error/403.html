<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Доступ запрещён</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 100px;
        }

        .error-box {
            background-color: #ffffff;
            border: 1px solid #cccccc;
            display: inline-block;
            padding: 30px;
            width: 400px;
        }

        h1 {
            color: #d9534f;
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            color: #555555;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .btn-group {
            margin-top: 15px;
        }

        .my-btn {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            margin: 0 5px;
        }
    </style>
</head>
<body>

<div class="error-box">
    <h1>Доступ запрещён</h1>
    <p>У вас недостаточно прав для просмотра этой страницы.</p>

    <div class="btn-group">
        <a th:href="@{/}">
            <button type="button" class="my-btn">На главную</button>
        </a>

        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="my-btn">Выйти из учётной записи</button>
        </form>
    </div>
</div>

</body>
</html>
